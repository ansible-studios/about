<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NDOVU Studios</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 650px;
      width: 100%;
    }

    /* High Text (Large Title) */
    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #ffffff;
      margin-bottom: 0.75rem;
    }

    /* Medium Text (Subheadings) */
    h2 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #38bdf8;
      margin-bottom: 0.5rem;
    }

    h3 {
      font-size: 1.25rem;
      font-weight: 400;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    /* Normal Text (Body) */
    p {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #cbd5e1;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>NDOVU Studios</h1>
    <h2>Software Development Consulting Firm</h2>
    <h3>Product Design & Development</h3>
    <p>A Product Engineering Firm.</p>
  </div>
</body>
</html>
