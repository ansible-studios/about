<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ansible Studios</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      width: 100%;
      margin: 20px;
    }

    /* High Text (Large Title) */
    h1 {
      font-size: 15vh;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #ffffff;
      margin-bottom: 0.75rem;
    }

    /* Medium Text (Subheadings) */
    h2 {
      font-size: 5vh;
      font-weight: 600;
      color: #38bdf8;
      margin-bottom: 0.5rem;
    }

    h3 {
      font-size: 1.25rem;
      font-weight: 400;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    /* Normal Text (Body) */
    p {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #cbd5e1;
      font-weight: 300;
    }

    .button {
      padding: 0.875rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: #0f172a;
      background-color: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 4px 14px rgba(56, 189, 248, 0.3);
    }

    .button:hover {
      background-color: #7dd3fc;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4);
    }

  </style>
</head>
<body>
  <div class="container">
    <h3>Product Design & Development</h3>
    <h1>Ansible Studios</h1>
    <h2>Software Development Consulting Firm</h2>
    <br/><br/>
    <p>"Turn your ideas into reality"</p>
    <br/><br/>
    <a href="mailto:wafulasammie@gmail.com"><button class="button">Ship faster with us</button></a>
  </div>
</body>
</html>
